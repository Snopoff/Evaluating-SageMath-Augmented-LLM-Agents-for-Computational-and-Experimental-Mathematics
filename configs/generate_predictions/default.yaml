_target_: src.benchmark.generate_predictions.GeneratePredictionsRunner
config:
  _target_: src.benchmark.generate_predictions.GeneratePredictionsConfig
  dataset_path: data/processed/problems_to_run.json
  output_dir: outputs/generate_predictions
  limit: -1
  start_with: 0
  progress_logs: true
  separate_logger_runs: false
  sleep_sec_between_problems: 2.0
  max_attempts_per_problem: 3
  retry_backoff_sec: 10.0
  retry_backoff_multiplier: 2.0
  continue_on_problem_error: true
  fsync_each_row: false
